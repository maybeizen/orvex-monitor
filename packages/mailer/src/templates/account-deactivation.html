<div style="font-family: system-ui, sans-serif; max-width: 480px; color: #e2e8f0; background: #0f172a; padding: 32px; border-radius: 12px;">
  <h1 style="color: #f8fafc; font-size: 20px; margin: 0 0 16px;">Account deactivation scheduled</h1>
  <p style="color: #94a3b8; line-height: 1.6; margin: 0 0 16px;">
    Your Orvex account has been scheduled for deletion on <strong style="color: #e2e8f0;">{{scheduledDate}}</strong>.
    You have 30 days to reactivate before your data is permanently removed.
  </p>
  <a href="{{reactivateUrl}}" style="display: inline-block; background: #6366f1; color: #fff; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600;">Reactivate account</a>
  <p style="color: #64748b; font-size: 12px; margin: 24px 0 0;">If you did not request this, reactivate immediately to restore access.</p>
</div>
